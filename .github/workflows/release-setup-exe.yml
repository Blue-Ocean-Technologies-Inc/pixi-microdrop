name: Release microdrop_setup.exe

# Rebuild and release the standalone setup executable whenever the setup
# script changes on master (or on demand via workflow_dispatch).
on:
  push:
    branches: [master]
    paths:
      - microdrop_setup.py
      - .github/workflows/release-setup-exe.yml
  workflow_dispatch:

permissions:
  contents: write   # create tags + releases

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Check out repo (with src submodule for the icon)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build onefile exe
        run: >
          pyinstaller --onefile --noconfirm --clean --name microdrop_setup
          --icon microdrop-py/src/microdrop_style/icons/Microdrop_Icon.ico
          microdrop_setup.py

      - name: Smoke-test the exe
        run: dist/microdrop_setup.exe --help

      - name: Create release with the exe attached
        uses: softprops/action-gh-release@v2
        with:
          tag_name: setup-v${{ github.run_number }}
          name: Microdrop Setup ${{ github.run_number }}
          body: >
            Standalone Microdrop setup/launcher executable, built from
            `microdrop_setup.py` @ ${{ github.sha }}.
            Stable download URL for the newest build:
            https://github.com/${{ github.repository }}/releases/latest/download/microdrop_setup.exe
          files: dist/microdrop_setup.exe
